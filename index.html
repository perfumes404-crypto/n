<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kafatemor Perfumes</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
text-align:center;
}

header{
background:black;
color:white;
padding:20px;
font-size:28px;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:30px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

.price{
font-size:20px;
margin:10px 0;
font-weight:bold;
}

button{
background:black;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#333;
}

.cart-button{
position:fixed;
top:20px;
right:20px;
background:black;
color:white;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

#cartMenu{
display:none;
position:fixed;
top:70px;
right:20px;
background:white;
border:1px solid #ccc;
padding:20px;
border-radius:10px;
width:260px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#cartItems{
list-style:none;
padding:0;
}

#cartItems li{
margin:8px 0;
}

.remove{
background:red;
padding:4px 8px;
margin-left:10px;
font-size:12px;
}

.whatsapp{
background:#25D366;
margin-top:10px;
width:100%;
}

</style>

</head>

<body>

<header>
Kafatemor Perfumes
</header>

<div class="cart-button" onclick="toggleCart()">
🛒 Carrito (<span id="cartCount">0</span>)
</div>

<div id="cartMenu">

<h3>Tu carrito</h3>

<ul id="cartItems"></ul>

<button class="whatsapp" onclick="sendToWhatsapp()">
Comprar por WhatsApp
</button>

</div>

<div class="container">

<div class="product">
<img src="khamrah.jpg">
<h2>Khamrah</h2>
<div class="price">$1990</div>
<button onclick="addToCart('Khamrah',1990)">
Agregar al carrito
</button>
</div>

<div class="product">
<img src="honor.jpg">
<h2>Honor & Glory</h2>
<div class="price">$1990</div>
<button onclick="addToCart('Honor & Glory',1990)">
Agregar al carrito
</button>
</div>

<div class="product">
<img src="mandarin.jpg">
<h2>Mandarin Sky</h2>
<div class="price">$1990</div>
<button onclick="addToCart('Mandarin Sky',1990)">
Agregar al carrito
</button>
</div>

</div>

<script>

let cart=[];

function addToCart(name,price){

cart.push({name,price});

updateCart();

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

let cartItems=document.getElementById("cartItems");

cartItems.innerHTML="";

cart.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=item.name+" $"+item.price+
` <button class="remove" onclick="removeItem(${index})">❌</button>`;

cartItems.appendChild(li);

});

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function toggleCart(){

let menu=document.getElementById("cartMenu");

menu.style.display=menu.style.display==="block"?"none":"block";

}

function sendToWhatsapp(){

let message="Hola! Quiero comprar:%0A%0A";

let total=0;

cart.forEach(item=>{
message+="- "+item.name+" $"+item.price+"%0A";
total+=item.price;
});

message+="%0ATotal: $"+total;

window.open("https://wa.me/59892436816?text="+message);

}

</script>

</body>
</html>
