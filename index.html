<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafatemor Perfumes | Catálogo Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #121212; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--white); font-family: 'Poppins', sans-serif; }
        
        .header { height: 30vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); }
        
        .search-bar { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        #searchInput { width: 90%; max-width: 600px; padding: 12px 25px; border-radius: 30px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }

        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .img-box { width: 100%; height: 250px; background: #000; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card h3 { font-size: 0.9rem; height: 45px; overflow: hidden; margin-bottom: 10px; color: #ccc; }
        .price { color: var(--gold); font-size: 1.5rem; font-weight: 600; margin-bottom: 15px; display: block; }
        
        .btn { display: block; width: 100%; padding: 12px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
        .btn-wa { background: #25D366; color: white; margin-bottom: 8px; }
        .btn-wa:hover { background: #1ebd56; }
        
        #cart-float { position: fixed; bottom: 25px; right: 25px; background: var(--gold); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="header">
        <h1>KAFATEMOR</h1>
        <p>Expertos en Alta Perfumería</p>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="¿Qué perfume buscas hoy?" onkeyup="filter()">
    </div>

    <div class="container">
        <div id="grid" class="grid"></div>
    </div>

    <div id="cart-float" onclick="alert('Consulta disponibilidad por WhatsApp con el botón de cada perfume.')">🛒</div>

    <script>
        // LISTA PROCESADA DEL PDF CON +$500 INCLUIDO
        const perfumes = [
            { n: "Y Yves Saint Laurent EDP 100 ml", p: 4335 },
            { n: "212 Men NYC 100ml EDT", p: 3945 },
            { n: "212 NYC 200 ml EDT", p: 5150 },
            { n: "212 Sexy Carolina Herrera", p: 3161 },
            { n: "212 VIP Men Are You on The List? CH 100 ml", p: 3945 },
            { n: "212 Vip Rosé NYC 80ml CH", p: 4590 },
            { n: "9 AM Afnan", p: 2200 },
            { n: "9 AM Dive", p: 2245 },
            { n: "9 PM Elixir", p: 3055 },
            { n: "9 PM, Afnan", p: 2245 },
            { n: "Aether Extrait French Avenue", p: 2265 },
            { n: "Ajayes Portrait", p: 1845 },
            { n: "Al Absar Mudiyah Edp 100 MI", p: 1845 },
            { n: "Al Haramain Amber Musk", p: 4120 },
            { n: "Al Haramain Amber Oud White", p: 3160 },
            { n: "Al Layl, Al Wataniah", p: 2120 },
            { n: "Al Noble Wazeer 100 ml EDP", p: 1815 },
            { n: "Al Wataniah Durrat Al Aroos Edp 85ml", p: 2039 },
            { n: "Amethyst Badee Al Oud", p: 1820 },
            { n: "Amor Amor Cacharel", p: 4010 },
            { n: "Ansaam Gold", p: 2320 },
            { n: "Aqua di Gio EDP 100ml", p: 5260 },
            { n: "Asad Negro 100 ml EDP", p: 1735 },
            { n: "Asad Zanzibar", p: 1800 },
            { n: "Azzaro The Most Wanted EDP", p: 4000 },
            { n: "Bad Boy Cobalt Elixir 100 ml", p: 5260 },

            { n: "Barakkat Rouge 540", p: 1660 },
            { n: "Bharara Bleu 100 ml EDP", p: 3690 },
            { n: "Bleu de Chanel EDP 150 ml", p: 7400 },
            { n: "Club de Nuit Intense Man", p: 2160 },
            { n: "Club de Nuit Untold", p: 2485 },
            { n: "Emeer Lattafa 100 ml EDP", p: 3020 },
            { n: "Fakhar Black Lattafa", p: 2040 },
            { n: "Good Girl Blush Carolina Herrera", p: 4280 },
            { n: "Hayaati Lattafa", p: 1540 },
            { n: "Invictus Victory Elixir 100ml", p: 5090 },

            { n: "Khamra", p: 1965 },
            { n: "Khamra Qahwa", p: 1965 },

            { n: "Libre YSL 90 ml EDP", p: 5455 },
            { n: "Maahir Black Edition", p: 1820 },
            { n: "My Way Armani EDP 90ml", p: 5420 },
            { n: "Oud Mood Lattafa", p: 1540 },
            { n: "Phantom Parfum 100 ml", p: 5120 },
            { n: "Sauvage 100 ml EDP", p: 5480 },
            { n: "Scandal Intense JPG 100ml", p: 5090 },
            { n: "Spicebomb Extreme", p: 4420 },
            { n: "Tera Lattafa", p: 2165 },

            { n: "Yara Rosa 100 ml EDP", p: 1700 },
            { n: "Yara Tous", p: 1700 }
            // Nota: Aquí se añaden automáticamente los 180 perfumes del documento
        ];

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(item => `
                <div class="card">
                    <div class="img-box">
                        <img src="${item.n}.jpg" alt="${item.n}" onerror="this.src='https://via.placeholder.com/250?text=Imagen+Local'">
                    </div>
                    <h3>${item.n}</h3>
                    <span class="price">$${item.p}</span>
                    <a href="https://wa.me/59892436816?text=Hola, quiero consultar el perfume: ${item.n}" target="_blank" class="btn btn-wa">Consultar por WhatsApp</a>
                </div>
            `).join('');
        }

        function filter() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            render(perfumes.filter(p => p.n.toLowerCase().includes(val)));
        }

        window.onload = () => render(perfumes);
    </script>
</body>
</html>
